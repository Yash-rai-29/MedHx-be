<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERGENCY MEDICAL CARD — SOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger-bg: #7f1d1d;
            --danger-border: #f87171;
            --danger-text: #fee2e2;
            --card-bg: #111827;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --accent: #ef4444;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .sos-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border: 2px solid var(--danger-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2);
            animation: pulse-border 2s infinite alternate;
        }
        .header {
            background-color: var(--danger-bg);
            padding: 24px 20px;
            text-align: center;
            border-bottom: 2px solid var(--danger-border);
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .header p {
            font-size: 14px;
            font-weight: 600;
            color: var(--danger-text);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .content {
            padding: 24px 20px;
        }
        .section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .patient-name {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }
        .blood-badge {
            display: inline-block;
            background-color: var(--accent);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 8px;
            margin-top: 6px;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            padding-left: 14px;
            position: relative;
        }
        li::before {
            content: "•";
            color: var(--accent);
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        .emergency-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 14px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .emergency-contact-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        .emergency-phone {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        @keyframes pulse-border {
            from {
                border-color: #ef4444;
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            }
            to {
                border-color: #f87171;
                box-shadow: 0 0 25px rgba(239, 68, 68, 0.45);
            }
        }
    </style>
</head>
<body>
    <div class="sos-container">
        <div class="header">
            <h1>Emergency Medical SOS</h1>
            <p>First Responder Info</p>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">Patient Identity</div>
                <div class="patient-name">$name</div>
                $blood_badge_html
            </div>
            
            <div class="section">
                <div class="section-title">Documented Allergies</div>
                <ul>
                    $allergies_list
                </ul>
            </div>
            
            <div class="section">
                <div class="section-title">Chronic Conditions</div>
                <ul>
                    $chronic_list
                </ul>
            </div>
            
            <div class="section">
                <div class="section-title">Active Medications</div>
                <ul>
                    $meds_list
                </ul>
            </div>
            
            <div class="section">
                <div class="section-title">Emergency Contact</div>
                <div class="emergency-details">
                    <div class="emergency-contact-name">$ec_name</div>
                    $emergency_phone_html
                </div>
            </div>
        </div>
    </div>
</body>
</html>
